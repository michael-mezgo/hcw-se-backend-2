services:
  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_MQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
  
  currency-service:
    image: ghcr.io/michael-mezgo/hcw-se-currency-converter-2:latest
    container_name: currency-service
    environment:
      ECB_URL: https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml
      API_KEY: ${CURRENCY_API_KEY}
      PORT: 5125

  mongo-user:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-user
    environment:
      MONGO_INITDB_DATABASE: ${USER_MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${USER_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${USER_MONGO_PASSWORD}
    volumes:
      - mongo-user-data:/data/db

  mongo-car:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-car
    environment:
      MONGO_INITDB_DATABASE: ${CAR_MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${CAR_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${CAR_MONGO_PASSWORD}
    volumes:
      - mongo-car-data:/data/db

  mongo-booking:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-booking
    environment:
      MONGO_INITDB_DATABASE: ${BOOKING_MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${BOOKING_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${BOOKING_MONGO_PASSWORD}
    volumes:
      - mongo-booking-data:/data/db

  booking-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/booking-service:latest
    container_name: booking-service
    environment:
      PORT: 8080
      MONGO_HOST: mongo-booking
      MONGO_USER: ${BOOKING_MONGO_USER}
      MONGO_PASSWORD: ${BOOKING_MONGO_PASSWORD}
      MONGO_PORT: 27017
      MONGO_DB: ${BOOKING_MONGO_DB}
      RABBITMQ_URI: ${RABBIT_MQ_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: APP
      JWT_AUDIENCE: APP
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-booking:
        condition: service_started
  
  car-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/car-service:latest
    container_name: car-service
    environment:
      PORT: 8080
      MONGO_HOST: mongo-car
      MONGO_USER: ${CAR_MONGO_USER}
      MONGO_PASSWORD: ${CAR_MONGO_PASSWORD}
      MONGO_PORT: 27017
      MONGO_DB: ${CAR_MONGO_DB}
      RABBITMQ_URI: ${RABBIT_MQ_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      GRPC_HOST: currency-service
      GRPC_PORT: 5125
      GRPC_API_KEY: ${CURRENCY_API_KEY}
      BLOB_CONTAINER_NAME: car-pictures
      BLOB_CONNECTION_STRING: ${BLOB_CONNECTION_STRING}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-car:
        condition: service_started

  user-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/user-service:latest
    container_name: user-service
    environment:
      PORT: 8080
      MONGO_HOST: mongo-user
      MONGO_USER: ${USER_MONGO_USER}
      MONGO_PASSWORD: ${USER_MONGO_PASSWORD}
      MONGO_PORT: 27017
      MONGO_DB: ${USER_MONGO_DB}
      RABBITMQ_URI: ${RABBIT_MQ_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-user:
        condition: service_started

  frontend:
    image: ghcr.io/michael-mezgo/hcw-se-frontend-2:latest
    container_name: frontend
    ports:
      - "80:80"
    environment:
      USER_SERVICE_URL: http://user-service:8080
      CAR_SERVICE_URL: http://car-service:8080
      BOOKING_SERVICE_URL: http://booking-service:8080
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      - user-service
      - car-service
      - booking-service

volumes:
  mongo-user-data:
  mongo-car-data:
  mongo-booking-data:
  caddy-data:
  caddy-config: