name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      booking-service: ${{ steps.filter.outputs.booking-service }}
      # Add new services here when they get a Dockerfile:
      car-service: ${{ steps.filter.outputs.car-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            booking-service:
              - 'booking-service/**'
              - 'shared-events/**'
            car-service:
              - 'car-service/**'
              - 'shared-events/**'
            user-service:
              - 'user-service/**'
              - 'shared-events/**'

  build-booking-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.booking-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push booking-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: booking-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/booking-service:latest
            ghcr.io/${{ github.repository }}/booking-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-car-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.car-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push car-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: car-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/car-service:latest
            ghcr.io/${{ github.repository }}/car-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  build-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push user-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: user-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/user-service:latest
            ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
