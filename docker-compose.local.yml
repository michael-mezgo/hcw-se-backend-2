services:
  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: seuser
      RABBITMQ_DEFAULT_PASS: Passw0rd
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - se-net
  
  currency-service:
    image: ghcr.io/michael-mezgo/hcw-se-currency-converter-2:latest
    container_name: currency-service
    environment:
      ECB_URL: https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml
      API_KEY: secret123
      PORT: 5125
    networks:
      se-net:
        ipv4_address: 172.28.0.10

  mongo-user:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-user
    environment:
      MONGO_INITDB_DATABASE: user-service
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo-user-data:/data/db
    networks:
      - se-net

  mongo-car:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-car
    environment:
      MONGO_INITDB_DATABASE: car-service
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo-car-data:/data/db
    networks:
      - se-net

  mongo-booking:
    image: mongodb/mongodb-community-server:latest-slim
    container_name: mongo-booking
    environment:
      MONGO_INITDB_DATABASE: booking-service
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo-booking-data:/data/db
    networks:
      - se-net

  booking-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/booking-service:latest
    container_name: booking-service
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_HOST: mongo-booking
      MONGO_USER: admin
      MONGO_PASSWORD: secretpassword
      MONGO_PORT: 27017
      MONGO_DB: booking-service
      RABBITMQ_URI: amqp://seuser:Passw0rd@rabbitmq:5672
      JWT_SECRET: changeme
      JWT_ISSUER: APP
      JWT_AUDIENCE: APP
    networks:
      - se-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-booking:
        condition: service_started
  
  car-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/car-service:latest
    container_name: car-service
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      MONGO_HOST: mongo-car
      MONGO_USER: admin
      MONGO_PASSWORD: secretpassword
      MONGO_PORT: 27017
      MONGO_DB: car-service
      RABBITMQ_URI: amqp://seuser:Passw0rd@rabbitmq:5672
      JWT_SECRET: changeme
      JWT_ISSUER: APP
      JWT_AUDIENCE: APP
      GRPC_HOST: 172.28.0.10
      GRPC_PORT: 5125
      GRPC_API_KEY: secret123
      BLOB_CONTAINER_NAME: car-pictures
      BLOB_CONNECTION_STRING: ${BLOB_CONNECTION_STRING}
    networks:
      - se-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-car:
        condition: service_started

  user-service:
    image: ghcr.io/michael-mezgo/hcw-se-backend-2/user-service:latest
    container_name: user-service
    ports:
      - "8082:8080"
    environment:
      PORT: 8080
      MONGO_HOST: mongo-user
      MONGO_USER: admin
      MONGO_PASSWORD: secretpassword
      MONGO_PORT: 27017
      MONGO_DB: user-service
      RABBITMQ_URI: amqp://seuser:Passw0rd@rabbitmq:5672
      JWT_SECRET: changeme
      JWT_ISSUER: APP
      JWT_AUDIENCE: APP
    networks:
      - se-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-user:
        condition: service_started
  
volumes:
  mongo-user-data:
  mongo-car-data:
  mongo-booking-data:

networks:
  se-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24